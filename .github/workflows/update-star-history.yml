name: Update Star History

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-star-history:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: python -m pip install pillow

      - name: Generate chart
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/generate-star-history.py

      - name: Open update PR
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/update-star-history
          title: "docs: update Star History chart"
          commit-message: "docs: update Star History chart"
          body: "Automated weekly refresh of `assets/star-history.png`."
          add-paths: assets/star-history.png
