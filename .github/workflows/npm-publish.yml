name: NPM Publish

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: none

jobs:
  npm:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          registry-url: "https://registry.npmjs.org/"
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Build
        run: npm run build
      # setup-node writes a dummy NODE_AUTH_TOKEN unless we pass the real secret.
      # npm install -g for OIDC trusted publishing is broken on this runner image.
      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  sync-homebrew:
    needs: npm
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"

      - name: Sync formula from npm tarball
        run: bash scripts/sync-homebrew-formula.sh

      - name: Commit formula update
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(homebrew): sync formula for release"
          file_pattern: Formula/zereight-mcp-gitlab.rb
